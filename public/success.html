<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Successful | ZORROZONE</title>

<link rel="stylesheet" href="css/style.css">

<style>
.success-box{
  text-align:center;
  background:white;
  padding:40px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  max-width:500px;
  margin:auto;
  margin-top:120px;
}

.success-box h2{
  font-size:28px;
  margin-bottom:15px;
}

.success-box p{
  color:#475569;
  margin-bottom:10px;
}

.course{
  font-weight:bold;
  background:linear-gradient(135deg,#ec4899,#7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.close-note{
  margin-top:20px;
  font-size:14px;
  color:#64748b;
}
</style>

</head>

<body>

<header>
  <div class="logo-container">
    <img src="/images/logo.png">
    <h1>ZORROZONE</h1>
  </div>
</header>

<div class="success-box">

  <h2>🎉 Registration Successful!</h2>

  <p>You have successfully registered for</p>
  <p class="course" id="courseName"></p>

  <br>

  <p>Thank you for choosing ZORROZONE ❤️</p>
  <p>We will contact you shortly via email or mobile.</p>

  <p class="close-note">You can safely close this tab.</p>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const course = params.get("course");

document.getElementById("courseName").innerText = course || "Your Course";
</script>

</body>
</html>
